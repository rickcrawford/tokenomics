# Tokenomics Configuration
#
# Copy this file to the project root as config.yaml and adjust for your environment.
# All values shown are defaults unless noted otherwise.

server:
  http_port: 8080
  https_port: 8443
  upstream_url: https://api.openai.com   # Default upstream (overridden by provider/policy)

  tls:
    enabled: true
    auto_gen: true       # Auto-generate a self-signed cert on startup
    cert_dir: ./certs    # Where auto-generated certs are stored
    # cert_file: ""      # Path to custom TLS cert (disables auto_gen)
    # key_file: ""       # Path to custom TLS key

storage:
  db_path: ./tokenomics.db   # BoltDB file for token storage

session:
  backend: memory             # "memory" or "redis"
  redis:
    addr: localhost:6379
    password: ""
    db: 0

security:
  hash_key_env: TOKENOMICS_HASH_KEY              # Env var for HMAC token hashing
  encryption_key_env: TOKENOMICS_ENCRYPTION_KEY   # Env var for AES-256-GCM at-rest encryption

# ── Logging ───────────────────────────────────────────────────────────
logging:
  level: info                # debug, info, warn, error
  format: json               # json or text
  request_body: false        # Log full request bodies (careful in production)
  response_body: false       # Log full response bodies
  hide_token_hash: false     # Mask token hashes with **** in logs
  disable_request: false     # Suppress per-request structured log lines

# ── Remote Token Sync ─────────────────────────────────────────────────
#
# Load tokens from a central config server on startup (and optionally on a schedule).
# Run the server: ./bin/tokenomics remote --addr :9090 --api-key my-remote-key
#
# remote:
#   url: http://config-server:9090
#   api_key: my-remote-key
#   sync: 300                # Fallback poll every 5 min (0 = startup only)
#   insecure: false          # Skip TLS verification
#   webhook:                 # Accept push events from central server
#     enabled: true
#     path: /v1/webhook      # Endpoint path (default)
#     secret: my-webhook-secret      # Must match central server's outbound secret
#     signing_key: my-signing-key    # Must match central server's outbound signing key

# ── Webhook Events ──────────────────────────────────────────────────────
#
# Fire HTTP POST requests when things happen.
# Run the sample collector to test:
#   go run examples/webhook-collector/main.go -secret my-webhook-secret -signing-key my-signing-key
#
events:
  webhooks:
    # Primary webhook -- gets everything
    - url: http://localhost:9090/webhook
      secret: my-webhook-secret          # Sent as X-Webhook-Secret header
      signing_key: my-signing-key        # HMAC-SHA256 signature in X-Webhook-Signature
      timeout: 10
      # events: []                       # Empty = all events

    # Alerting webhook -- only violations and budget alerts
    # - url: https://alerts.example.com/tokenomics
    #   secret: alerts-secret
    #   events:
    #     - "rule.violation"
    #     - "budget.exceeded"
    #     - "rate.exceeded"
    #     - "token.expired"

    # Audit webhook -- token lifecycle only
    # - url: https://audit.example.com/tokenomics
    #   signing_key: audit-hmac-key
    #   events:
    #     - "token.*"
    #     - "server.start"
