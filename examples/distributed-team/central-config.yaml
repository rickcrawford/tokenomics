# Central Config Server
#
# This config is for the machine that manages the token database.
# Run: ./tokenomics remote --addr :9090 --api-key "$TOKENOMICS_REMOTE_KEY"
#
# Token CRUD commands (token create, list, update, delete) run against this database.
# Proxy instances sync tokens from this server via the REST API.
#
# When tokens are created/updated/deleted, the outbound webhooks below push
# events to each proxy instance, triggering immediate sync.

storage:
  db_path: ./tokenomics.db

security:
  hash_key_env: TOKENOMICS_HASH_KEY
  encryption_key_env: TOKENOMICS_ENCRYPTION_KEY

logging:
  level: info
  format: json
  hide_token_hash: false

# Push token changes to proxy instances via webhook.
# Add one entry per proxy instance.
events:
  webhooks:
    - url: https://proxy.internal:8443/v1/webhook
      secret: change-me-webhook-secret
      signing_key: change-me-signing-key
      events: ["token.*"]
      timeout: 10
    # Add more proxy instances as needed:
    # - url: https://proxy-eu.internal:8443/v1/webhook
    #   secret: change-me-webhook-secret
    #   signing_key: change-me-signing-key
    #   events: ["token.*"]
