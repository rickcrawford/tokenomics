server:
  http_port: 8080
  https_port: 8443
  tls:
    enabled: true
    cert_dir: "./certs"

admin:
  enabled: true

# CLI to provider mappings - auto-detects provider when running commands
# Example: `tokenomics run claude ...` automatically uses anthropic provider
cli_maps:
  claude: anthropic
  anthropic: anthropic
  python: generic
  node: generic
  curl: generic

providers:
  anthropic:
    upstream_url: https://api.anthropic.com
    api_key_env: MY_ANTHROPIC_API_KEY_NEW
    auth_scheme: header
    auth_header: x-api-key
    headers:
      anthropic-version: "2023-06-01"
    chat_path: /v1/messages
    models:
      - claude-opus-4-6
      - claude-sonnet-4-6
      - claude-haiku-4-5
      - claude-3-5-sonnet-20241022
