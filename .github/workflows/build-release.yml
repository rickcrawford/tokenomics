name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Linux
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            ext: ''
          - os: linux
            arch: arm64
            runner: ubuntu-latest
            ext: ''

          # macOS
          - os: darwin
            arch: amd64
            runner: macos-latest
            ext: ''
          - os: darwin
            arch: arm64
            runner: macos-latest
            ext: ''

          # Windows
          - os: windows
            arch: amd64
            runner: windows-latest
            ext: '.exe'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
        run: go build -o tokenomics${{ matrix.ext }} .

      - name: Create archive (Linux/macOS)
        if: matrix.os != 'windows'
        run: |
          tar -czf tokenomics-${{ matrix.os }}-${{ matrix.arch }}.tar.gz tokenomics
          echo "ASSET=tokenomics-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: matrix.os == 'windows'
        run: |
          powershell -Command "Compress-Archive -Path tokenomics.exe -DestinationPath tokenomics-windows-${{ matrix.arch }}.zip"
          echo "ASSET=tokenomics-windows-${{ matrix.arch }}.zip" >> $GITHUB_ENV

      - name: Calculate checksum
        run: |
          if [ "${{ matrix.os }}" = "windows" ]; then
            certutil -hashfile ${{ env.ASSET }} SHA256
          else
            sha256sum ${{ env.ASSET }} > ${{ env.ASSET }}.sha256
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: binaries
          path: |
            tokenomics-*
            *.sha256

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: binaries

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: tokenomics-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
