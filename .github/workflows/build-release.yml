name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release archives
        run: |
          set -euo pipefail
          mkdir -p dist

          # Compute build variables
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo dev)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo unknown)
          DATE=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          LDFLAGS="-s -w -X github.com/rickcrawford/tokenomics/cmd.Version=${VERSION} -X github.com/rickcrawford/tokenomics/cmd.Commit=${COMMIT} -X github.com/rickcrawford/tokenomics/cmd.BuildDate=${DATE}"

          build_unix() {
            local goos="$1"
            local goarch="$2"
            local out="tokenomics-${goos}-${goarch}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" go build -trimpath -ldflags="${LDFLAGS}" -o dist/tokenomics .
            tar -czf "dist/${out}.tar.gz" -C dist tokenomics
            rm -f dist/tokenomics
          }

          build_windows() {
            local goarch="$1"
            local out="tokenomics-windows-${goarch}"
            CGO_ENABLED=0 GOOS=windows GOARCH="${goarch}" go build -trimpath -ldflags="${LDFLAGS}" -o dist/tokenomics.exe .
            (cd dist && zip -q "${out}.zip" tokenomics.exe)
            rm -f dist/tokenomics.exe
          }

          build_unix linux amd64
          build_unix linux arm64
          build_unix darwin amd64
          build_unix darwin arm64
          build_windows amd64

          cp install.sh dist/install.sh
          cp install-latest.sh dist/install-latest.sh
          chmod +x dist/install.sh dist/install-latest.sh

      - name: Generate checksums
        run: |
          set -euo pipefail
          (cd dist && shasum -a 256 tokenomics-* > checksums.txt)

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/tokenomics-*
            dist/checksums.txt
            dist/install.sh
            dist/install-latest.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
